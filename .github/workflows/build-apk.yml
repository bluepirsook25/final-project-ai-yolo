name: Build APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build LuxeSmile APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake build-essential ccache cmake git libffi-dev \
            libltdl-dev libncurses5-dev libncursesw5-dev libssl-dev libtool \
            openjdk-17-jdk pkg-config python3-pip unzip zip zlib1g-dev
          sudo apt-get install -y libtinfo5 || echo "libtinfo5 unavailable, continuing"

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install Cython==0.29.36 buildozer virtualenv

      - name: Create buildozer.spec
        run: |
          cat > mobile-app/buildozer.spec << 'SPEC'
          [app]
          title = LuxeSmile Dental
          package.name = luxesmiledental
          package.domain = org.dental
          version = 1.0
          source.dir = .
          source.include_exts = py,png,jpg,jpeg,json
          requirements = python3
          android.minapi = 26
          android.api = 36
          android.ndk = 25b
          android.archs = arm64-v8a
          android.accept_sdk_license = True
          android.permissions = INTERNET,CAMERA,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
          orientation = portrait
          fullscreen = 0
          p4a.bootstrap = webview
          p4a.port = 8766

          [buildozer]
          log_level = 2
          warn_on_root = 1
          SPEC
          cat mobile-app/buildozer.spec

      - name: Build the APK
        working-directory: mobile-app
        run: |
          export JAVA_HOME="${JAVA_HOME_17_X64:-/usr/lib/jvm/temurin-17-jdk-amd64}"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          buildozer android debug

      - name: Locate the built APK
        run: |
          APK=$(find mobile-app/bin -name "*.apk" | head -n1)
          test -n "$APK"
          cp "$APK" LuxeSmile.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luxesmile-apk
          path: LuxeSmile.apk
          if-no-files-found: error

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: LuxeSmile latest build
          target_commitish: ${{ github.sha }}
          files: LuxeSmile.apk
